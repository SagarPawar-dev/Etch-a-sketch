<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETCH A SKETCH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>ETCH A SKETCH</h1>
    <div class="container">
        <div class="controls">
            <div class="size-color">
                <div class="scroll">
                    <label for="gridSize">Grid Size: <span id="gridValue">16 x 16</span></label>
                    <input type="range" id="gridSize" min="1" max="100" value="16">
                    <button id="createBtn">Create grid</button>
                </div>
                
                <div class="color">
                    <label for="colorPicker">Color picker: </label>
                    <input type="color" id="colorPicker" value="#000000"> 
                </div>    
            </div>

            <div class="erase-help" role="toolbar" aria-label="Drawing tools">
                <div class="erase">
                    <button id="clearBtn">Clear grid</button>
                </div>

                <div class="eraser">
                    <button id="eraserBtn">Eraser</button>
                </div>
                <div class="random">
                    <button id="randomBtn">Random</button>
                </div>
            </div>
            
        </div>

        <div class="drawing-pad" aria-label="Drawing canvas">

        </div>
    </div>

    <footer>
    <p>© 2026 Sagar Pawar</p>

    <a href="https://github.com/sagarpawar-dev"
       target="_blank"
       class="github-link">

    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg"
        alt="GitHub">GitHub
    </a>
    </footer>


    <script src="script.js"></script>
</body>
</html>
