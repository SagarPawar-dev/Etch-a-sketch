<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETCH A SKETCH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>ETCH A SKETCH</h1>
    <div class="container">
        <div class="controls">
            <div class="size-color">
                <label for="gridSize">Grid Size: <span id="gridValue">16</span></label>
                <input type="range" id="gridSize" min="1" max="100" value="16">
                <button id="createBtn">Create Grid</button>
                <br>
                <label for="colorPicker">Color picker: </label>
                <input type="color" id="colorPicker"> 
            </div>

            <div class="erase-help">
                <div class="erase">
                    <button id="clearBtn">Clear grid</button>
                </div>

                <div class="help">
                    <button id="helpBtn">Help ?</button>
                </div>
            </div>
            
        </div>

        <div class="drawing-pad">

        </div>
    </div>
